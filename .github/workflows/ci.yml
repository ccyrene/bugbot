name: CI

# Enterprise-grade gate for the bugbot Rust crate.
# Runs on every PR into main, every push to main, and inside the merge queue.
# Branch protection on `main` requires the single aggregate check `CI` (the
# `ci-success` job below) so jobs can be added/removed without re-editing
# branch-protection settings.
#
# Third-party actions are pinned to full commit SHAs (supply-chain hardening);
# the trailing comment records the human-readable version. Dependabot
# (.github/dependabot.yml) keeps these SHAs current.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

# Least privilege: the whole workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs for the same PR; never cancel main / merge-queue runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"        # incremental is wasted work on ephemeral CI; better cache hit-rate
  CARGO_NET_RETRY: "10"
  RUSTUP_MAX_RETRIES: "10"
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo test
        run: cargo test --workspace --all-features --locked

  build-release:
    name: build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo build --release
        run: cargo build --release --locked --bin bugbot

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Must match `rust-version` in Cargo.toml. The effective floor is 1.88
      # (pulled up by jsonwebtoken -> simple_asn1 -> time 0.3.47; previously
      # 1.86 via icu_normalizer 2.2.0 -> reqwest -> url -> idna).
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # MSRV covers the shipped artifact (lib + bin), NOT --all-targets: the
      # dev-dependency wiremock 0.6.5 uses let-chains and needs rustc >= 1.88,
      # but dev-deps never reach downstream consumers or the deploy image.
      - run: cargo check --workspace --locked

  audit:
    name: cargo-audit (RUSTSEC)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: cargo-audit
      # Fails on any dependency with a known RUSTSEC vulnerability advisory.
      - run: cargo audit

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      # Builds the full deploy image (rust:1.92-bookworm + Node + codex/claude CLIs).
      # This is the only place the Dockerfile is exercised end-to-end; the baked-in
      # `codex --version && claude --version` smoke check runs as part of the build.
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: false
          tags: bugbot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Single aggregate gate. Branch protection requires only this context ("CI").
  ci-success:
    name: CI
    if: always()
    needs: [fmt, clippy, test, build-release, msrv, audit, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more CI jobs failed or were cancelled:"
          echo '${{ toJSON(needs) }}'
          exit 1
      - run: echo "All CI gate jobs passed."
