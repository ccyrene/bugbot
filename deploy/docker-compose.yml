# =====================================================================
# bugbot — Docker Compose for a single VPS.
#
# Stack:
#   * caddy  — TLS termination, path allowlist, hardening headers
#   * bugbot — Rust webhook server + codex/claude CLI worker
#
# Quickstart:
#   1. Install Docker + compose plugin.
#   2. Clone the repo.
#   3. cp deploy/.env.example deploy/.env  &&  $EDITOR deploy/.env
#   4. cp deploy/Caddyfile.example deploy/Caddyfile  &&  $EDITOR Caddyfile
#   5. (codex/claude subscription auth) on the host:
#        sudo bash ../scripts/install-host.sh        # runs `codex login`
#      then uncomment the matching bind-mount below.
#   6. cd deploy  &&  docker compose up -d --build
#
# LLM auth — pick ONE per backend:
#   codex (default backend):
#     A. OPENAI_API_KEY in .env (pay-per-token), OR
#     B. `codex login` on host, bind-mount ~/.codex (uses your ChatGPT plan).
#   claude (fallback backend, BUGBOT_LLM_BACKEND=claude):
#     A. ANTHROPIC_API_KEY in .env, OR
#     B. `claude login` on host, bind-mount ~/.claude.
# =====================================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: bugbot-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - bugbot_net
    depends_on:
      - bugbot
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  bugbot:
    build:
      context: ..
      dockerfile: Dockerfile
    image: bugbot:0.3.0
    container_name: bugbot
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    # Bind-mount the host's CLI auth if you authenticated via subscription
    # (`codex login` / `claude login`). The mounts are read-WRITE: the CLIs
    # rewrite their token files on refresh. A read-only mount breaks once the
    # access token expires.
    volumes:
      - codex_state:/home/bugbot/.codex
      # - /root/.codex:/home/bugbot/.codex
      # - /root/.claude:/home/bugbot/.claude
    networks:
      - bugbot_net
    # Untrusted PR clones go to a bounded tmpfs (memory-backed; nothing
    # persists across restarts). Size it with the clone cap + headroom.
    tmpfs:
      - /tmp:size=1g,mode=1777,exec
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          # The codex/claude Node CLI is the memory hog (≈500MB baseline,
          # documented spikes). Budget ~1.5–2GB per concurrent review.
          memory: 4g
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:
  codex_state:

networks:
  bugbot_net:
    driver: bridge
